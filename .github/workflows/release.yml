name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run validation
        shell: pwsh
        run: |
          uv sync --extra build --frozen
          uv run python -m py_compile main.py locate.py app_services.py app_state.py test.py
          uv run python -m unittest test.py

      - name: Build release bundle
        shell: pwsh
        run: .\scripts\build-release.ps1 -ReleaseTag '${{ github.ref_name }}' -SkipDependencySync

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist\RePKG_GUI-${{ github.ref_name }}-windows.zip
